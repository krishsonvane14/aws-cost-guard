# ──────────────────────────────────────────────────────────────────────────────
# AWS Cost Guard — Daily Report
# ──────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   AWS_ROLE_ARN           — IAM role ARN created by terraform/oidc.tf
#   DISCORD_WEBHOOK_URL    — Discord incoming webhook URL (optional)
#   SLACK_WEBHOOK_URL      — Slack incoming webhook URL  (optional)
#   WEBHOOK_URL            — Fallback webhook URL
# ──────────────────────────────────────────────────────────────────────────────

name: Daily Cost Report

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily

  workflow_dispatch:

# Required for OIDC — allows GitHub to mint an OIDC token and checkout code.
permissions:
  id-token: write   # Required: allows GitHub to mint an OIDC token
  contents: read    # Required: allows checkout

jobs:
  cost-report:
    name: Fetch & Send AWS Cost Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.lock"

      # No static keys needed — GitHub OIDC token is exchanged for
      # a short-lived AWS session.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Run Cost Guard
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python -m src.main

      - name: Type check
        run: mypy src/ --ignore-missing-imports

      - name: Lint check
        run: ruff check src/

      - name: Run tests
        run: pytest
